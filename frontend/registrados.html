<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos Registrados</title>
    <link rel="stylesheet" href="css/styles.css"> 
</head>
<body>
    <header class="top-bar">
        <a href="menu.html">
            <img src="img/logo.png" alt="Logo" class="logo-small">
        </a>
        <div class="analyst-name">
            Analista: Nombre Apellido
        </div>
    </header>
    <div class="main-container">
        <div class="tabla-card">
            <h2>Registrados</h2>
            <div class="filtros-container">
                <label for="filtro-tiempo">Filtros:</label>
                <select id="filtro-tiempo">
                    <option>Últimas 24 h</option>
                    <option>Última semana</option>
                    <option>Último mes</option>
                </select>
                <label for="filtro-magnitud">Magnitud:</label>
                <select id="filtro-magnitud">
                    <option>Todas</option>
                    <option>> 5.0</option>
                    <option>> 6.0</option>
                </select>
                <button class="btn-editar">Aplicar</button>
            </div>
            <table class="eventos-table">
                <thead>
                    <tr>
                        <th>Fecha/Hora</th>
                        <th>Ubicación Epicentro</th>
                        <th>Ubicación Hipocentro</th> <!-- <-- COLUMNA AÑADIDA -->
                        <th>Magnitud</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-registrados-body">
                    <!-- Filas generadas por JS -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="js/registrados.js"></script>
</body>
</html>
