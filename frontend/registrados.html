<!--
Historial de eventos registrados
 - Muestra todos los eventos sísmicos sin importar su estado actual
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos Registrados</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="top-bar">
    <a href="menu.html">
        <img src="img/logo.png" class="logo-small" alt="Logo">
    </a>
    <div class="analyst-name">Analista: <span id="nombreUsuario"></span></div>
  </header>

  <script>
      //Consigue el nombre de usuario desde el localStorage
     const sesionString = localStorage.getItem('sesion');
     if (sesionString) {
        const sesionData = JSON.parse(sesionString); //Transforma el string en un objeto JSON
        document.getElementById('nombreUsuario').textContent = sesionData.usuario; //Agrega el nombre al mensaje de bienvenida

     } else {
      //Si no hay datos en el localStorage, redirige al usuario al login
        window.location.href = 'login.html';
     }

    </script>
  
  <div class="main-container">
    <div class="tabla-card">
      <h2>Registrados</h2>
      
      <div class="filtros-container">
        Filtros:
        <select>
          <option>Últimas 24 h</option>
          <option>Última semana</option>
          <option>Todos</option>
        </select>
        Magnitud:
        <select>
          <option>Todas</option>
          <option>> 4.0</option>
          <option>> 5.0</option>
        </select>
        <button class="btn-aplicar-filtros">Aplicar</button>
      </div>
      
      <table class="eventos-table">
        <!--Encabezado de la tabla-->
        <thead>
          <tr>
            <th>Fecha/Hora</th>
            <th>Ubicación Epicentro</th>
            <th>Ubicación Hipocentro</th>
            <th>Magnitud</th>
            <th>Acción</th>
          </tr>
        </thead>
        
        <tbody id="tabla-registrados-body"> 
        </tbody>
      </table>
    </div>
  </div>

  <!--Archivo JS que controlará esta página -->
  <script src="js/registrados.js"></script>
</body>
</html>
