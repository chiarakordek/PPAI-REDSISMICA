<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos Registrados</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="top-bar">
    <a href="menu.html">
        <img src="img/logo.png" class="logo-small" alt="Logo">
    </a>
    <span class="analyst-name">Analista: Nombre Apellido</span>
  </header>
  
  <div class="main-container">
    <div class="tabla-card">
      <h2>Registrados</h2>
      
      <div class="filtros-container">
        Filtros:
        <select>
          <option>Últimas 24 h</option>
          <option>Última semana</option>
          <option>Todos</option>
        </select>
        Magnitud:
        <select>
          <option>Todas</option>
          <option>> 4.0</option>
          <option>> 5.0</option>
        </select>
        <button class="btn-aplicar-filtros">Aplicar</button>
      </div>
      
      <table class="eventos-table">
        <thead>
          <tr>
            <th>Fecha/Hora</th>
            <th>Ubicación Epicentro</th>
            <th>Ubicación Hipocentro</th>
            <th>Magnitud</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla-registrados-body"> 
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/registrados.js"></script>
</body>
</html>
