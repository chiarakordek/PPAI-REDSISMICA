<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Evento</title>
    <link rel="stylesheet" href="css/styles.css"> 
</head>
<body>
    <header class="top-bar">
        <a href="menu.html">
            <img src="img/logo.png" alt="Logo" class="logo-small">
        </a>
        <div class="analyst-name">
            Analista: <span id="nombreUsuario"></span>
        </div>
    </header>

    <script>
      //Consigue el nombre de usuario desde el localStorage
     const sesionString = localStorage.getItem('sesion');
     if (sesionString) {
        const sesionData = JSON.parse(sesionString); //Transforma el string en un objeto JSON
        document.getElementById('nombreUsuario').textContent = sesionData.usuario; //Agrega el nombre al mensaje de bienvenida

     } else {
      //Si no hay datos en el localStorage, redirige al usuario al login
        window.location.href = 'login.html';
     }

    </script>

    <div class="evento-container">
        <div class="detalle-evento-card">
            
            <div class="evento-header">
                <h2 id="evento-id">Cargando evento...</h2>
            </div>
            
            <div class="evento-info">
                <p id="clasificacion">Clasificación: Cargando...</p>
                <p id="alcance">Alcance: Cargando...</p>
                <p id="origen">Origen del evento: Cargando...</p>
            </div>
            
            <div class="estado-section">
                <!-- El JavaScript necesita un elemento hijo para modificar, no el contenedor directamente -->
                <span id="estado-actual">Estado: Cargando...</span>
            </div>
            
            <div id="acciones-container" class="acciones-evento">
                <!-- Botones originales -->
                <div id="botones-pendientes" class="acciones-origen">
                    <button class="btn-accion btn-editar">Modificar Datos</button>
                    <button class="btn-accion btn-ver-mapa">Ver Mapa</button>
                </div>

                <!-- botones de decisión -->
                <div id="botones-decision" class="acciones-decision-container">
                    <button class="btn-accion btn-confirmar">Confirmar</button>
                    <button class="btn-accion btn-derivar">Derivar</button>
                    <button class="btn-accion btn-rechazar">Rechazar</button>
                </div>
            </div>
            
        </div>
    </div>
    

    <script src="js/evento.js"></script>
</body>
</html>
