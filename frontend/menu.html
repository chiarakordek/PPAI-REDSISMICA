<!--
    Menú de opciones
  * Deriva a la lista de eventos pendientes de revisión 
    o al historial de eventos registrados (sin importar estados)
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú Principal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body id="menuPrincipal">
  <div class="wrapper">
    <div class="contenedor-opaco">
      <img src="img/logo.png" alt="Logo" class="logo" />
      <h1>Bienvenido <span id="nombreUsuario"></span></h1>
    
      <div class="botones">

        <!-- Deriva a la lista de eventos pendientes de revisión -->
        <button class="btn" id="btnRegistrarRes">Registrar Resultado de Revisión Manual</button> 
        
        <!-- Deriva al historial de eventos registrados -->
        <!-- <a href="registrados.html" class="btn">Ver Historial de Eventos</a> comente esto

      </div>
    </div>
  </div>
</body>
</html>

<script>
  const btnRegistrarResult = document.getElementById('btnRegistrarRes');
  
  function opcionRegistrarNuevaRevision(){
    window.location.href = 'eventosPendientes.html';
  }
  if (btnRegistrarResult) {
    btnRegistrarResult.addEventListener('click', opcionRegistrarNuevaRevision);
  }
</script>
