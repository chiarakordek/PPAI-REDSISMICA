<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menú Principal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="wrapper">
    <div class="contenedor-opaco">
      <img src="img/logo.png" alt="Logo" class="logo" />
      <h1>Bienvenido, <span id="nombreUsuario"></span></h1>

    <script>
     const sesionString = localStorage.getItem('sesion');
     if (sesionString) {
        const sesionData = JSON.parse(sesionString);
        document.getElementById('nombreUsuario').textContent = sesionData.usuario;
     } else {
        window.location.href = 'login.html';
     }
    </script>
    
      <div class="botones">
        <!-- El texto del botón ahora refleja la acción del DDS: "Registrar Nueva Revisión" -->
        <a href="pendientes.html" class="btn">Registrar Nueva Revisión</a>
        
        <a href="registrados.html" class="btn">Ver Registros Históricos</a>
      </div>
    </div>
  </div>
</body>
</html>
