<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos Pendientes</title>
  <!-- Esta línea carga tus estilos -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="top-bar">
    <a href="menu.html">
        <img src="img/logo.png" class="logo-small" alt="Logo">
    </a>
    <div class="analyst-name">Analista: <span id="nombreUsuario"></span></div>
  </header>
  
  <script>
      //Consigue el nombre de usuario desde el localStorage
     const sesionString = localStorage.getItem('sesion');
     if (sesionString) {
        const sesionData = JSON.parse(sesionString); //Transforma el string en un objeto JSON
        document.getElementById('nombreUsuario').textContent = sesionData.usuario; //Agrega el nombre al mensaje de bienvenida

     } else {
      //Si no hay datos en el localStorage, redirige al usuario al login
        window.location.href = 'login.html';
     }

    </script>

  <div class="main-container">
    <div class="tabla-card">
      <h2>Eventos con estado: PendienteEnRevision</h2>
      
      <div class="filtros-container">
        <!-- Puedes añadir tus filtros aquí si los necesitas -->
      </div>
      
      <table class="eventos-table">
        <thead>
          <tr>
            <th>Fecha/Hora</th>
            <th>Ubicación Epicentro</th>
            <th>Ubicación Hipocentro</th>
            <th>Magnitud</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla-pendientes-body"> 
          <!-- JavaScript llenará esta tabla -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Esta línea carga tu lógica de JavaScript -->
  <script src="js/pendientes.js"></script>
</body>
</html>
